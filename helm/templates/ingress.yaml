apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vuela-ingress
  annotations:
    # Cambiado a public para coincidir con la clase de MicroK8s
    kubernetes.io/ingress.class: "public"
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Si aún no tienes certificados SSL, pon esto en "false" para probar por HTTP
    nginx.ingress.kubernetes.io/ssl-redirect: "true" 
spec:
  ingressClassName: public
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ .Values.ingress.tlsSecret }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.backend.name }}-service
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.frontend.name }}-service
            port:
              number: 80
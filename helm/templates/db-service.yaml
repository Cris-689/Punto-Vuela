apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.database.name }}-service
spec:
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
      name: http
    - port: 4002
      targetPort: 4002
      protocol: TCP
      name: raft
  selector:
    app: {{ .Values.database.name }}